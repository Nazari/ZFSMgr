name: Build Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          cache: true

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x ./scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x ./scripts/build-macos.sh
          ./scripts/build-macos.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-windows.ps1

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: zfsmgr-linux
          path: |
            build-linux/zfsmgr_qt
            build-linux/help/**
            build-linux/i18n/**
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: zfsmgr-macos
          path: |
            build-macos/*.app
            build-macos/help/**
            build-macos/i18n/**
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: zfsmgr-windows
          path: |
            build-windows/Release/zfsmgr_qt.exe
            build-windows/help/**
            build-windows/i18n/**
          if-no-files-found: warn

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake qt6-base qt6-tools qt6-linguisttools openssl git
          run: |
            chmod +x ./scripts/build-freebsd.sh
            ./scripts/build-freebsd.sh

      - name: Upload FreeBSD artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zfsmgr-freebsd
          path: |
            build-freebsd/zfsmgr_qt
            build-freebsd/help/**
            build-freebsd/i18n/**
          if-no-files-found: warn
