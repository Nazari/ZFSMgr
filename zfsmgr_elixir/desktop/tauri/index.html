<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZFSMgr (Elixir/Tauri)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>ZFSMgr</h1>
      <div class="api-box">
        <label for="apiUrl">API</label>
        <input id="apiUrl" type="text" value="http://127.0.0.1:4001/api" />
        <button id="saveApiBtn">Usar</button>
      </div>
      <button id="reloadBtn">Refrescar</button>
    </header>

    <main class="app-shell">
      <section class="upper-pane">
        <aside class="left-pane panel">
          <div class="left-tabs">
            <button id="leftTabConnections" class="tab-btn active" data-tab="connections">Conexiones</button>
            <button id="leftTabDatasets" class="tab-btn" data-tab="datasets">Datasets</button>
          </div>

          <div id="leftPanelConnections" class="tab-panel active">
            <div id="connectionsMeta" class="meta"></div>
            <div id="actionStatus" class="action-status">Listo</div>

            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Tipo</th>
                  <th>Host</th>
                  <th>Puerto</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="connectionsBody"></tbody>
            </table>
          </div>

          <div id="leftPanelDatasets" class="tab-panel">
            <div class="actions-wrap">
              <h3>Conexion seleccionada</h3>
              <div id="selectedConn" class="meta">(ninguna)</div>

              <div class="action-grid">
                <div class="action-card">
                  <h4>Pools</h4>
                  <label>Pool</label>
                  <input id="poolName" type="text" placeholder="games" list="poolList" />
                  <div class="row-btns">
                    <button id="importPoolBtn">Importar</button>
                    <button id="exportPoolBtn">Exportar</button>
                  </div>
                </div>

                <div class="action-card">
                  <h4>Crear dataset</h4>
                  <label>Dataset</label>
                  <input id="createDataset" type="text" placeholder="pool/path" list="datasetList" />
                  <label>Tipo</label>
                  <select id="createKind">
                    <option value="filesystem">filesystem</option>
                    <option value="volume">volume</option>
                    <option value="snapshot">snapshot</option>
                  </select>
                  <label>Volsize (volume)</label>
                  <input id="createVolsize" type="text" placeholder="10G" />
                  <label>Recursivo (snapshot)</label>
                  <select id="createRecursive">
                    <option value="false" selected>false</option>
                    <option value="true">true</option>
                  </select>
                  <button id="createDatasetBtn">Crear</button>
                </div>

                <div class="action-card">
                  <h4>Borrar / Renombrar</h4>
                  <label>Dataset objetivo</label>
                  <input id="deleteDataset" type="text" placeholder="pool/path" list="datasetList" />
                  <label>Borrado recursivo</label>
                  <select id="deleteRecursive">
                    <option value="false" selected>false</option>
                    <option value="true">true</option>
                  </select>
                  <button id="deleteDatasetBtn">Borrar</button>
                  <label>Origen rename</label>
                  <input id="renameSource" type="text" placeholder="pool/source" list="datasetList" />
                  <label>Destino rename</label>
                  <input id="renameTarget" type="text" placeholder="pool/target" list="datasetList" />
                  <button id="renameDatasetBtn">Renombrar</button>
                </div>

                <div class="action-card">
                  <h4>Propiedades</h4>
                  <label>Dataset</label>
                  <input id="propDataset" type="text" placeholder="pool/path" list="datasetList" />
                  <label>Propiedad</label>
                  <input id="propName" type="text" placeholder="mountpoint" list="propertyList" />
                  <label>Valor</label>
                  <input id="propValue" type="text" placeholder="/mnt/data" />
                  <div class="row-btns">
                    <button id="setPropBtn">Aplicar</button>
                    <button id="inheritPropBtn">Inherit</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </aside>

        <section class="right-pane panel">
          <h2>Detalle</h2>
          <div class="detail-grid">
            <div class="detail-card">
              <h3>Pools importados</h3>
              <ul id="detailPools" class="detail-list"></ul>
            </div>
            <div class="detail-card">
              <h3>Datasets (pool seleccionado)</h3>
              <ul id="detailDatasets" class="detail-list"></ul>
            </div>
          </div>
        </section>
      </section>

      <section class="log-pane panel">
        <h2>Log combinado</h2>
        <div class="controls">
          <label for="logLimit">Nivel</label>
          <select id="logLimit">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
          </select>
          <button id="reloadLogsBtn">Refrescar log</button>
        </div>
        <div id="logsBox" class="logs-box"></div>
      </section>
    </main>

    <datalist id="poolList"></datalist>
    <datalist id="datasetList"></datalist>
    <datalist id="propertyList"></datalist>

    <script type="module" src="./app.js"></script>
  </body>
</html>
